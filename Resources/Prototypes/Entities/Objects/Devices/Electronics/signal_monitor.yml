- type: entity
  parent: BaseItem
  id: SignalMonitor
  name: signal monitor
  description: A handheld device used for remotely monitoring the value of a connected signal.
  components:
  - type: SignalMonitor
  - type: Sprite
    sprite: Objects/Devices/signal_monitor.rsi
    layers:
    - state: signal_monitor
    - state: screen
      map: ["screen_layer"]
      visible: false
  - type: DeviceLinkSink
    ports:
    - Input
  - type: DeviceNetwork
    deviceNetId: Wireless
    receiveFrequencyId: BasicDevice
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.SignalMonitorLayers.Screen:
        screen_layer:
          Idle: { visible: false }
          Low: { visible: true, color: red }
          High: { visible: true, color: lime }
